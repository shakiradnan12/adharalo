<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AdharAlo Control Center v5.0 (Enterprise Cinema OS)</title>
<!-- Tailwind CSS, Google Fonts & Font Awesome -->
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
  body {
    font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
    background-color: #0b0c10; /* Netflix True Matte Dark */
    color: #e2e8f0;
    overflow-x: hidden;
    letter-spacing: -0.01em;
  }
  .premium-card {
    background: #11131a;
    border: 1px solid rgba(255, 255, 255, 0.04);
    box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.7);
    transition: all 0.25s ease-in-out;
  }
  .premium-card:hover {
    background: #141720;
    border-color: rgba(255, 255, 255, 0.08);
    transform: translateY(-2px);
  }
  .netflix-btn-primary {
    background-color: #e50914; /* Netflix Red */
    color: #ffffff;
    transition: background-color 0.2s ease;
  }
  .netflix-btn-primary:hover {
    background-color: #b80710;
  }
  .prime-input {
    background: #181b24;
    border: 1px solid rgba(255, 255, 255, 0.08);
    color: #ffffff;
    transition: all 0.2s ease;
  }
  .prime-input:focus {
    border-color: #3b82f6; /* Premium Focus Highlight */
    background: #1c202b;
    outline: none;
  }
  /* Custom Smooth Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: #0b0c10; }
  ::-webkit-scrollbar-thumb { background: #222530; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #e50914; }
</style>
</head>
<body class="min-h-screen">

<!-- PREMIUM AUTH OVERLAY -->
<div id="lov" class="fixed inset-0 flex items-center justify-center z-50 px-4 bg(#0b0c10)/95 backdrop-blur-lg">
  <div class="premium-card p-12 rounded-2xl w-full max-w-md">
    <div class="text-center mb-8">
      <h2 class="text-3xl font-extrabold tracking-tight text-white mb-1">ADHARALO<span class="text-[#e50914]">.</span></h2>
      <p class="text-xs text-slate-500 uppercase tracking-widest font-semibold">Cinema Server Architecture</p>
    </div>
    <div class="mb-6 relative">
      <input id="pw" type="password" placeholder="Password Security Key" class="prime-input w-full px-5 py-4 rounded-xl text-sm font-mono text-center outline-none" onkeydown="if(event.key==='Enter')login()">
    </div>
    <button class="w-full nettech-btn netflex netflix-btn-primary text-xs tracking-wider font-bold py-4 rounded-xl shadow-lg transition-all" onclick="login()">SIGN IN TO DATABASE</button>
    <p id="lerr" class="text-rose-500 text-xs mt-4 hidden text-center font-medium"><i class="fa-solid fa-circle-exclamation mr-1.5"></i> Authentication Failed. Verify Key.</p>
  </div>
</div>

<!-- MAIN NETFLIX LAYOUT -->
<div id="app" class="hidden min-h-screen pb-24">
  <!-- Brand Header -->
  <nav class="sticky top-0 z-40 px-6 lg:px-16 py-5 flex items-center justify-between border-b border-white/5 bg-[#0b0c10]/90 backdrop-blur-md">
    <div class="flex items-center gap-6">
      <span class="font-extrabold text-2xl tracking-tighter text-white">ADHARALO<span class="text-[#e50914]">PRO</span></span>
      <div class="hidden md:flex items-center gap-1.5 text-xs font-semibold text-emerald-400 bg-emerald-500/5 px-3 py-1.5 rounded-full border border-emerald-500/10">
        <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span> Cloud Stream Node: Online
      </div>
    </div>
    <div class="flex items-center gap-4">
      <a id="install-link" href="#" class="bg-white/5 hover:bg-white/10 text-white text-xs font-bold px-4 py-2.5 rounded-lg border border-white/10 transition-all"><i class="fa-solid fa-clapperboard mr-1.5"></i> Stremio Client</a>
      <button class="bg-white/5 hover:bg-rose-500/20 text-slate-400 hover:text-rose-400 p-3 rounded-lg border border-white/5 transition-all" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i></button>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-6 mt-10">
    <!-- ENDPOINT METRICS -->
    <div class="premium-card p-6 rounded-2xl flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
      <div class="flex items-center gap-4">
        <div class="w-11 h-11 rounded-xl bg-white/5 flex items-center justify-center text-slate-400 text-sm"><i class="fa-solid fa-server"></i></div>
        <div>
          <div class="text-[10px] uppercase font-bold tracking-wider text-slate-400 mb-0.5">Stremio Live API Manifest Base</div>
          <div class="font-mono text-xs text-white/80 select-all" id="manifest-url">CONNECTING...</div>
        </div>
      </div>
      <button class="bg-white hover:bg-slate-200 text-black text-xs font-bold px-5 py-3 rounded-xl transition shadow-md" onclick="cp()"><i class="fa-regular fa-copy mr-1.5"></i> Copy API Endpoint</button>
    </div>

    <!-- METRIC TILES -->
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-10">
      <div class="premium-card p-6 rounded-xl flex items-center justify-between">
        <div>
          <div class="text-xs font-bold tracking-wider text-slate-400 uppercase">Movies Mounted</div>
          <div class="text-4xl font-extrabold mt-1.5 text-white" id="count-movies">0</div>
        </div>
        <div class="text-2xl text-slate-600"><i class="fa-solid fa-film"></i></div>
      </div>
      <div class="premium-card p-6 rounded-xl flex items-center justify-between">
        <div>
          <div class="text-xs font-bold tracking-wider text-slate-400 uppercase">TV Series Library</div>
          <div class="text-4xl font-extrabold mt-1.5 text-white" id="count-series">0</div>
        </div>
        <div class="text-2xl text-slate-600"><i class="fa-solid fa-tv"></i></div>
      </div>
      <div class="premium-card p-6 rounded-xl flex items-center justify-between">
        <div>
          <div class="text-xs font-bold tracking-wider text-slate-400 uppercase">OMDb Pro Status</div>
          <div class="text-sm font-bold mt-3 text-emerald-400 flex items-center gap-1.5"><i class="fa-solid fa-shield-halved text-xs"></i> Enterprise Engine Active</div>
        </div>
        <div class="text-2xl text-slate-600"><i class="fa-solid fa-bolt"></i></div>
      </div>
    </div>

    <!-- TAB ACTIONS & LIVE FILTER -->
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8 border-b border-white/5 pb-4">
      <div class="flex gap-6">
        <button class="text-sm font-bold pb-3 relative transition-all border-b-2" id="tm" onclick="sw('movie')">Movies System</button>
        <button class="text-sm font-bold pb-3 relative transition-all border-b-2" id="ts" onclick="sw('series')">TV Series Cluster</button>
      </div>
      <div class="relative w-full md:max-w-xs">
        <span class="absolute left-4 top-3 text-slate-500 text-xs"><i class="fa-solid fa-magnifying-glass"></i></span>
        <input id="q-search" type="text" placeholder="Search library items..." class="prime-input w-full pl-10 pr-4 py-2.5 rounded-lg text-xs" oninput="filterItems()">
      </div>
    </div>

    <!-- CORE OPERATION CONTROL PANELS -->
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
      <!-- CONTROL INTERFACE -->
      <div class="lg:col-span-5">
        <!-- MOVIE CONFIGURATION -->
        <div id="pm" class="premium-card p-6 lg:p-8 rounded-2xl">
          <h3 class="text-base font-bold mb-6 text-white tracking-tight flex items-center gap-2"><i class="fa-solid fa-square-plus text-slate-400"></i> Inject New Movie Node</h3>
          <div class="space-y-5">
            <div>
              <label class="text-[11px] font-semibold text-slate-400 block mb-2">IMDb URL / Identity Token</label>
              <input id="mi" type="text" placeholder="e.g. tt0816692" class="prime-input w-full px-4 py-3 rounded-lg text-xs font-mono">
            </div>
            <div>
              <label class="text-[11px] font-semibold text-slate-400 block mb-2">Primary Stream Endpoint</label>
              <input id="mu" type="text" placeholder="http://source-server.com/video.mkv" class="prime-input w-full px-4 py-3 rounded-lg text-xs">
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div>
                <label class="text-[11px] font-semibold text-slate-400 block mb-2">1080p URL (Optional)</label>
                <input id="m1" type="text" placeholder="Direct link" class="prime-input w-full px-3 py-3 rounded-lg text-xs">
              </div>
              <div>
                <label class="text-[11px] font-semibold text-slate-400 block mb-2">720p URL (Optional)</label>
                <input id="m7" type="text" placeholder="Direct link" class="prime-input w-full px-3 py-3 rounded-lg text-xs">
              </div>
            </div>
            <button class="w-full netflix-btn-primary text-white text-xs font-bold py-4 rounded-lg transition mt-2 uppercase tracking-wide" onclick="addMovie()"><i class="fa-solid fa-plus mr-1.5"></i> Deploy Movie Assets</button>
          </div>
        </div>

        <!-- SERIES CONFIGURATION -->
        <div id="ps" class="premium-card p-6 lg:p-8 rounded-2xl hidden">
          <h3 class="text-base font-bold mb-6 text-white tracking-tight flex items-center gap-2"><i class="fa-solid fa-circle-plus text-slate-400"></i> Mount Series Index</h3>
          <div class="space-y-5">
            <div>
              <label class="text-[11px] font-semibold text-slate-400 block mb-2">Series IMDb Identifier</label>
              <input id="si" type="text" placeholder="e.g. tt0944947" class="prime-input w-full px-4 py-3 rounded-lg text-xs font-mono">
            </div>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="text-[11px] font-semibold text-slate-400 block mb-2">Season Index</label>
                <input id="ss" type="number" min="1" value="1" class="prime-input w-full px-4 py-3 rounded-lg text-xs font-bold text-center">
              </div>
              <div>
                <label class="text-[11px] font-semibold text-slate-400 block mb-2">Episode Index</label>
                <input id="se" type="number" min="1" value="1" class="prime-input w-full px-4 py-3 rounded-lg text-xs font-bold text-center">
              </div>
            </div>
            <div>
              <label class="text-[11px] font-semibold text-slate-400 block mb-2">Episode Stream URL</label>
              <input id="su" type="text" placeholder="http://source-server.com/s01e01.mp4" class="prime-input w-full px-4 py-3 rounded-lg text-xs">
            </div>
            <button class="w-full bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold py-4 rounded-lg transition mt-2 uppercase tracking-wide" onclick="addEp()"><i class="fa-solid fa-plus mr-1.5"></i> Link Episode Stream</button>
          </div>
        </div>
      </div>

      <!-- STREAM REPOSITORY FEEDS -->
      <div class="lg:col-span-7">
        <div id="ml-container" class="space-y-4">
          <div id="ml" class="space-y-4"></div>
        </div>
        <div id="sl-container" class="space-y-4 hidden">
          <div id="sl" class="space-y-5"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MINIMAL SLICK TOAST -->
<div id="toast" class="fixed bottom-8 right-8 px-6 py-4 rounded-xl text-xs font-bold shadow-2xl transform translate-y-32 opacity-0 transition-all duration-300 z-50 flex items-center gap-3 backdrop-blur-md"></div>

<script>
// Static Token setup 
var OMDB_API_KEY = 'deb30ab'; 

var D = [];
var nameCache = {}; 
var BASE = window.location.origin;
var currentTab = 'movie';
var $=function(id){return document.getElementById(id);};

function xid(v){var m=v.match(/tt\d+/);return m?m[0]:v.trim();}

function init(){
  $('manifest-url').textContent = BASE + '/manifest.json';
  $('install-link').href = 'stremio://' + window.location.host + '/manifest.json';
  fetch('/api/me').then(function(r){return r.json();}).then(function(me){
    if(me.loggedIn){show();load();}
  });
  sw('movie');
}

function show(){$('lov').style.display='none';$('app').style.display='block';}

function login(){
  fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:$('pw').value})})
  .then(function(r){
    if(r.ok){show();load();}
    else $('lerr').style.display='block';
  });
}

function logout(){ fetch('/api/logout',{method:'POST'}).then(function(){location.reload();}); }
function load(){ fetch('/api/movies').then(function(r){return r.json();}).then(function(d){D=d;render();}); }

function updateStats(mvCount, srCount) {
  $('count-movies').textContent = mvCount;
  $('count-series').textContent = srCount;
}

function fetchName(id, elementId, posterId, metaId) {
  if (nameCache[id]) {
    var cacheData = nameCache[id];
    var el = $(elementId), pEl = $(posterId), mEl = $(metaId);
    if(el) el.textContent = cacheData.title;
    if(pEl && cacheData.poster !== 'N/A') pEl.src = cacheData.poster;
    if(mEl) mEl.textContent = cacheData.meta;
    var parent = el.closest(currentTab === 'movie' ? '.movie-item' : '.series-item');
    if(parent) parent.setAttribute('data-name', cacheData.searchString);
    return;
  }

  fetch('https://www.omdbapi.com/?apikey=' + OMDB_API_KEY + '&i=' + id)
    .then(function(r){ return r.json(); })
    .then(function(data){
      var el = $(elementId), pEl = $(posterId), mEl = $(metaId);
      if(data && data.Title) {
        var cleanTitle = data.Title + ' (' + data.Year + ')';
        var rating = data.imdbRating !== 'N/A' ? '★ ' + data.imdbRating : '★ N/A';
        var runtime = data.Runtime !== 'N/A' ? data.Runtime : '';
        var metaText = rating + '  •  ' + data.Genre + '  •  ' + runtime;
        
        nameCache[id] = {
          title: cleanTitle,
          poster: data.Poster,
          meta: metaText,
          searchString: (cleanTitle + ' ' + data.Genre + ' ' + id).toLowerCase()
        };

        if(el) el.textContent = cleanTitle;
        if(pEl && data.Poster !== 'N/A') pEl.src = data.Poster;
        if(mEl) mEl.textContent = metaText;
        
        var parent = el.closest(currentTab === 'movie' ? '.movie-item' : '.series-item');
        if(parent) parent.setAttribute('data-name', nameCache[id].searchString);
      } else {
        if(el) el.textContent = id;
      }
    })
    .catch(function(){ 
      var el = $(elementId); if(el) el.textContent = id;
    });
}

function addMovie(){
  var id=xid($('mi').value),url=$('mu').value.trim(),u1=$('m1').value.trim(),u7=$('m7').value.trim();
  if(!id||!url){toast('Valid credentials required','e');return;}
  var item={id:id,type:'movie',streamUrl:url};
  if(u1)item.streamUrl1080p=u1;
  if(u7)item.streamUrl720p=u7;
  post(item,function(d){
    D=d; render();
    $('mi').value=$('mu').value=$('m1').value=$('m7').value='';
    toast('Movie deployment asset mounted successfully.');
  });
}

function addEp(){
  var id=xid($('si').value),s=parseInt($('ss').value),e=parseInt($('se').value),url=$('su').value.trim();
  if(!id||!url){toast('Invalid parameters entered','e');return;}
  var item={id:id,type:'series',episodes:[{season:s,episode:e,streamUrl:url}]};
  post(item,function(d){
    D=d; render();
    $('su').value=''; $('se').value=e+1;
    toast('Episode streaming index map successfully established.');
  });
}

function post(item,cb){
  fetch('/api/movies',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(item)})
  .then(function(r){return r.json();}).then(function(d){cb(d.data);});
}

function del(id){
  if(!confirm('Confirm complete operational erasure of this asset?')) return;
  fetch('/api/movies/'+id,{method:'DELETE'}).then(function(r){return r.json();}).then(function(d){D=d.data;render();toast('Node terminated from catalog.','e');});
}

function delEp(id,s,e){
  fetch('/api/movies/'+id+'/episodes/'+s+'/'+e,{method:'DELETE'}).then(function(r){return r.json();}).then(function(d){D=d.data;render();toast('Episode mapping severed.','e');});
}

function filterItems() {
  var q = $('q-search').value.toLowerCase().trim();
  var items = document.querySelectorAll(currentTab === 'movie' ? '.movie-item' : '.series-item');
  
  items.forEach(function(item) {
    var id = item.getAttribute('data-id').toLowerCase();
    var name = item.getAttribute('data-name') ? item.getAttribute('data-name').toLowerCase() : '';
    if(id.includes(q) || name.includes(q)) {
      item.style.display = currentTab === 'series' ? 'block' : 'flex';
    } else {
      item.style.display = 'none';
    }
  });
}

function render(){
  var mv=D.filter(function(m){return m.type==='movie';}),
      sr=D.filter(function(m){return m.type==='series';});

  updateStats(mv.length, sr.length);

  if(mv.length===0){
    $('ml').innerHTML='<div class="premium-card text-slate-500 text-center text-xs py-20 rounded-xl border-dashed border-white/5"><i class="fa-solid fa-folder-open text-xl mb-3 block text-slate-600"></i>No streams deployed within current cluster framework</div>';
  } else {
    $('ml').innerHTML=mv.map(function(m, index){
      var uniqueElId = 'movie-name-' + index;
      var uniquePostId = 'movie-poster-' + index;
      var uniqueMetaId = 'movie-meta-' + index;
      var quals=[m.streamUrl1080p?'1080p':'',m.streamUrl720p?'720p':'',m.streamUrl?'Source':''].filter(Boolean).map(function(q){
        return '<span class="bg-white/5 px-2 py-0.5 rounded text-[10px] text-slate-300 font-sans tracking-wide">'+q+'</span>';
      }).join(' ');
      
      setTimeout(function(){ fetchName(m.id, uniqueElId, uniquePostId, uniqueMetaId); }, 35 * index);

      return '<div class="movie-item premium-card p-4 rounded-xl flex items-center justify-between border border-white/5" data-id="'+m.id+'" data-name="">' +
             '<div class="flex items-center gap-4 w-full mr-4">' +
             '  <img id="'+uniquePostId+'" src="https://images.unsplash.com/photo-1594909122845-11baa439b7bf?w=100" class="w-12 h-16 object-cover rounded shadow-md bg-slate-900" alt="">' +
             '  <div class="space-y-1 truncate w-full">' +
             '    <div class="flex items-center flex-wrap gap-2">' +
             '      <span id="'+uniqueElId+'" class="text-white font-bold text-sm tracking-tight">Syncing catalog...</span>' +
             '      <a href="https://www.imdb.com/title/'+m.id+'" target="_blank" class="text-[10px] font-mono text-slate-500 hover:text-blue-400 flex items-center gap-1 transition"><i class="fa-solid fa-arrow-up-right-from-square"></i> IMDb</a>' +
             '    </div>' +
             '    <div id="'+uniqueMetaId+'" class="text-xs text-slate-400 font-medium">Loading asset dimensions...</div>' +
             '    <div class="flex items-center gap-2 pt-0.5">'+quals+'</div>' +
             '  </div>' +
             '</div>' +
             '<button class="bg-rose-500/10 hover:bg-rose-600/20 border border-rose-500/10 text-rose-400 text-xs font-semibold px-4 py-2.5 rounded-lg transition duration-150 flex items-center gap-2 flex-shrink-0" onclick="del(\''+m.id+'\')"><i class="fa-solid fa-trash-can text-[11px]"></i> Delete</button></div>';
    }).join('');
  }

  if(sr.length===0){
    $('sl').innerHTML='<div class="premium-card text-slate-500 text-center text-xs py-20 rounded-xl border-dashed border-white/5"><i class="fa-solid fa-folder-open text-xl mb-3 block text-slate-600"></i>No series elements currently parsed inside repository</div>';
  } else {
    $('sl').innerHTML=sr.map(function(s, index){
      var uniqueElId = 'series-name-' + index;
      var uniquePostId = 'series-poster-' + index;
      var uniqueMetaId = 'series-meta-' + index;
      var eps=(s.episodes||[]).map(function(e){
        var sn=String(e.season).padStart(2,'0'),en=String(e.episode).padStart(2,'0');
        return '<div class="flex items-center justify-between bg-white/[0.02] border border-white/5 rounded-lg px-4 py-3 text-xs text-slate-300 hover:bg-white/[0.04] transition">' +
               '<span class="font-mono text-blue-400 font-semibold tracking-wider bg-blue-500/5 px-2 py-0.5 rounded border border-blue-500/10">S'+sn+'E'+en+'</span>' +
               '<span class="text-[11px] text-slate-400 truncate px-4 font-mono select-all flex-1 text-left">'+e.streamUrl+'</span>' +
               '<button class="text-slate-500 hover:text-rose-400 p-1 transition" onclick="delEp(\''+s.id+'\','+e.season+','+e.episode+')"><i class="fa-solid fa-xmark text-sm"></i></button></div>';
      }).join('');
      
      setTimeout(function(){ fetchName(s.id, uniqueElId, uniquePostId, uniqueMetaId); }, 35 * index);

      return '<div class="series-item premium-card p-5 rounded-xl border border-white/5" data-id="'+s.id+'" data-name="">' +
             '<div class="flex justify-between items-center pb-4 border-b border-white/5 mb-4">' +
             '  <div class="flex items-center gap-4">' +
             '    <img id="'+uniquePostId+'" src="https://images.unsplash.com/photo-1594909122845-11baa439b7bf?w=100" class="w-12 h-16 object-cover rounded shadow-md bg-slate-900" alt="">' +
             '    <div class="space-y-0.5">' +
             '      <div class="flex items-center flex-wrap gap-2">' +
             '         <span id="'+uniqueElId+'" class="text-white font-bold text-sm tracking-tight">Syncing catalog...</span>' +
             '         <a href="https://www.imdb.com/title/'+s.id+'" target="_blank" class="text-[10px] font-mono text-slate-500 hover:text-blue-400 flex items-center gap-1 transition"><i class="fa-solid fa-arrow-up-right-from-square"></i> IMDb</a>' +
             '      </div>' +
             '      <div id="'+uniqueMetaId+'" class="text-xs text-slate-400 font-medium">Loading specifications...</div>' +
             '    </div>' +
             '  </div>' +
             '  <button class="bg-rose-500/5 hover:bg-rose-600/20 border border-rose-500/10 text-rose-400 text-xs font-semibold px-3 py-2 rounded-lg transition" onclick="del(\''+s.id+'\')"><i class="fa-solid fa-trash-can mr-1"></i> Wipe Series</button>' +
             '</div>' +
             '<div class="space-y-2 max-h-60 overflow-y-auto pr-1">' + eps + '</div></div>';
    }).join('');
  }
}

function sw(t){
  currentTab = t;
  $('pm').style.display=t==='movie'?'block':'none';
  $('ps').style.display=t==='series'?'block':'none';
  
  $('ml-container').style.display=t==='movie'?'block':'none';
  $('sl-container').style.display=t==='series'?'block':'none';

  $('tm').className='text-sm font-bold pb-3 relative transition-all border-b-2 '+(t==='movie'?'border-[#e50914] text-white':'border-transparent text-slate-400 hover:text-white');
  $('ts').className='text-sm font-bold pb-3 relative transition-all border-b-2 '+(t==='series'?'border-[#e50914] text-white':'border-transparent text-slate-400 hover:text-white');
  filterItems();
}

function cp(){
  navigator.clipboard.writeText(BASE+'/manifest.json').then(function(){
    toast('Streaming core manifest endpoint link extracted safely.');
  });
}

function toast(msg,type){
  var t=$('toast'); 
  t.innerHTML = type === 'e' ? '<i class="fa-solid fa-circle-exclamation text-rose-500 text-sm"></i> '+msg : '<i class="fa-solid fa-circle-check text-emerald-500 text-sm"></i> '+msg;
  t.style.background = '#14161f';
  t.style.border = type === 'e' ? '1px solid rgba(244, 63, 94, 0.15)' : '1px solid rgba(16, 185, 129, 0.15)';
  t.style.color = type === 'e' ? '#fecdd3' : '#e2e8f0';
  
  t.classList.remove('translate-y-32', 'opacity-0');
  t.classList.add('translate-y-0', 'opacity-100');
  
  setTimeout(function(){
    t.classList.remove('translate-y-0', 'opacity-100');
    t.classList.add('translate-y-32', 'opacity-0');
  }, 3200);
}

init();
</script>
</body>
