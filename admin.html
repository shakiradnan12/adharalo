<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AdharAlo Premium Dashboard</title>
<!-- Tailwind CSS & Google Fonts -->
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
  body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    background: radial-gradient(circle at top right, #1e1b4b, #090514);
    color: #f1f5f9;
  }
  .glass {
    background: rgba(19, 15, 38, 0.7);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.08);
  }
  .glass-input {
    background: rgba(5, 3, 13, 0.6);
    border: 1px solid rgba(255, 255, 255, 0.1);
    transition: all 0.2s ease;
  }
  .glass-input:focus {
    border-color: #a855f7;
    box-shadow: 0 0 10px rgba(168, 85, 247, 0.2);
  }
</style>
</head>
<body class="min-height-vh">

<!-- login screen -->
<div id="lov" class="fixed inset-0 flex items-center justify-center z-50 px-4">
  <div class="glass p-8 rounded-2xl w-full max-w-sm text-center shadow-2xl">
    <div class="w-16 h-16 bg-gradient-to-tr from-purple-600 to-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4 text-2xl shadow-lg shadow-purple-500/20">
      <i class="fa-solid from-purple-500 fa-clapperboard"></i>
    </div>
    <h2 class="text-xl font-bold tracking-tight mb-2">AdharAlo Control Center</h2>
    <p class="text-xs text-slate-400 mb-6">অ্যাডমিন প্যানেলে লগইন করুন</p>
    
    <div class="mb-4">
      <input id="pw" type="password" placeholder="অ্যাডমিন পাসওয়ার্ড" class="glass-input w-full px-4 py-3 rounded-xl text-sm outline-none text-white text-center" onkeydown="if(event.key==='Enter')login()">
    </div>
    <button class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-sm font-semibold py-3 rounded-xl transition duration-200 shadow-lg shadow-purple-600/30" onclick="login()">L O G I N</button>
    <p id="lerr" class="text-red-400 text-xs mt-3 hidden flex items-center justify-center gap-1"><i class="fa-solid fa-circle-exclamation"></i> ভুল password!</p>
  </div>
</div>

<!-- main control panel -->
<div id="app" class="hidden min-h-screen pb-12">
  <!-- navbar -->
  <nav class="glass sticky top-0 z-40 px-4 lg:px-8 py-3 flex items-center justify-between border-b border-white/5">
    <div class="flex items-center gap-2">
      <span class="text-xl text-purple-500"><i class="fa-solid fa-bolt"></i></span>
      <span class="font-bold text-sm lg:text-base tracking-wide">AdharAlo <span class="bg-gradient-to-r from-purple-400 to-indigo-400 bg-clip-text text-transparent font-medium">By Adnan</span></span>
    </div>
    <div class="flex items-center gap-3">
      <a id="install-link" href="#" class="glass bg-purple-600/10 hover:bg-purple-600/20 text-purple-300 border-purple-500/20 text-xs font-semibold px-4 py-2 rounded-xl flex items-center gap-1.5 transition"><i class="fa-solid fa-download"></i> Stremio Install</a>
      <button class="bg-red-500/10 hover:bg-red-500/20 text-red-400 border border-red-500/20 text-xs font-semibold px-3 py-2 rounded-xl transition" onclick="logout()"><i class="fa-solid fa-power-off"></i></button>
    </div>
  </nav>

  <div class="max-w-5xl mx-auto px-4 mt-8">
    <!-- manifest url manager -->
    <div class="glass p-4 rounded-2xl flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6 shadow-xl">
      <div class="overflow-hidden">
        <div class="text-[10px] uppercase font-bold tracking-wider text-slate-400 mb-1 flex items-center gap-1.5"><i class="fa-solid fa-link text-indigo-400"></i> Stremio Manifest URL</div>
        <div class="font-mono text-xs text-purple-300 truncate" id="manifest-url"></div>
      </div>
      <button class="bg-indigo-600 hover:bg-indigo-500 text-xs font-semibold px-5 py-2.5 rounded-xl transition shrink-0 shadow-lg shadow-indigo-600/20" onclick="cp()"><i class="fa-regular fa-copy mr-1"></i> Copy URL</button>
    </div>

    <!-- stats section -->
    <div class="grid grid-cols-2 gap-4 mb-8">
      <div class="glass p-5 rounded-2xl shadow-xl flex items-center gap-4">
        <div class="w-12 h-12 rounded-xl bg-purple-500/10 flex items-center justify-center text-xl text-purple-400"><i class="fa-solid fa-film"></i></div>
        <div>
          <div class="text-xs text-slate-400">মোট মুভি</div>
          <div class="text-xl font-bold mt-0.5" id="count-movies">0</div>
        </div>
      </div>
      <div class="glass p-5 rounded-2xl shadow-xl flex items-center gap-4">
        <div class="w-12 h-12 rounded-xl bg-indigo-500/10 flex items-center justify-center text-xl text-indigo-400"><i class="fa-solid fa-tv"></i></div>
        <div>
          <div class="text-xs text-slate-400">মোট সিরিজ</div>
          <div class="text-xl font-bold mt-0.5" id="count-series">0</div>
        </div>
      </div>
    </div>

    <!-- content workflow tabs -->
    <div class="flex gap-2 p-1.5 bg-black/30 rounded-xl max-w-xs mb-6">
      <button class="flex-1 py-2 text-xs font-semibold rounded-lg transition duration-150 text-slate-400" id="tm" onclick="sw('movie')"><i class="fa-solid fa-film mr-1.5"></i>মুভি</button>
      <button class="flex-1 py-2 text-xs font-semibold rounded-lg transition duration-150 text-slate-400" id="ts" onclick="sw('series')"><i class="fa-solid fa-tv mr-1.5"></i>সিরিজ</button>
    </div>

    <!-- layout setup split view -->
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
      <!-- primary forms area -->
      <div class="lg:col-span-5">
        <!-- movie content add system -->
        <div id="pm" class="glass p-6 rounded-2xl shadow-xl mb-6">
          <h3 class="text-sm font-bold tracking-wide mb-5 text-purple-400 uppercase flex items-center gap-2"><i class="fa-solid fa-square-plus"></i> নতুন মুভি যোগ করুন</h3>
          <div class="space-y-4">
            <div>
              <label class="text-xs text-slate-400 block mb-1.5">IMDB লিঙ্ক বা ID</label>
              <input id="mi" type="text" placeholder="tt0816692 অথবা IMDB URL" class="glass-input w-full px-4 py-2.5 rounded-xl text-xs text-white">
            </div>
            <div>
              <label class="text-xs text-slate-400 block mb-1.5">Default Stream URL</label>
              <input id="mu" type="text" placeholder="http://ftp.server.com/movie.mkv" class="glass-input w-full px-4 py-2.5 rounded-xl text-xs text-white">
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="text-xs text-slate-400 block mb-1.5">1080p URL (ঐচ্ছিক)</label>
                <input id="m1" type="text" placeholder="http://..." class="glass-input w-full px-3 py-2.5 rounded-xl text-xs text-white">
              </div>
              <div>
                <label class="text-xs text-slate-400 block mb-1.5">720p URL (ঐচ্ছিক)</label>
                <input id="m7" type="text" placeholder="http://..." class="glass-input w-full px-3 py-2.5 rounded-xl text-xs text-white">
              </div>
            </div>
            <button class="w-full bg-purple-600 hover:bg-purple-500 text-xs font-semibold py-3 rounded-xl transition duration-150 shadow-lg shadow-purple-600/20 mt-2" onclick="addMovie()"><i class="fa-solid fa-plus mr-1"></i> মুভি ডেটাবেজে যুক্ত করুন</button>
          </div>
        </div>

        <!-- series content manager -->
        <div id="ps" class="glass p-6 rounded-2xl shadow-xl mb-6 hidden">
          <h3 class="text-sm font-bold tracking-wide mb-5 text-indigo-400 uppercase flex items-center gap-2"><i class="fa-solid fa-circle-plus"></i> এপিসোড যোগ করুন</h3>
          <div class="space-y-4">
            <div>
              <label class="text-xs text-slate-400 block mb-1.5">IMDB লিঙ্ক বা ID (সিরিজের)</label>
              <input id="si" type="text" placeholder="tt0944947 অথবা IMDB URL" class="glass-input w-full px-4 py-2.5 rounded-xl text-xs text-white">
            </div>
            <div class="grid grid-cols-3 gap-2">
              <div>
                <label class="text-xs text-slate-400 block mb-1.5">Season</label>
                <input id="ss" type="number" min="1" value="1" class="glass-input w-full px-3 py-2.5 rounded-xl text-xs text-white text-center">
              </div>
              <div>
                <label class="text-xs text-slate-400 block mb-1.5">Episode</label>
                <input id="se" type="number" min="1" value="1" class="glass-input w-full px-3 py-2.5 rounded-xl text-xs text-white text-center">
              </div>
              <div class="col-span-1">
                <label class="text-xs text-slate-400 block mb-1.5">&nbsp;</label>
                <div class="text-[10px] text-slate-500 text-center pt-3">Season Auto</div>
              </div>
            </div>
            <div>
              <label class="text-xs text-slate-400 block mb-1.5">Stream URL</label>
              <input id="su" type="text" placeholder="http://ftp.server.com/s01e01.mkv" class="glass-input w-full px-4 py-2.5 rounded-xl text-xs text-white">
            </div>
            <button class="w-full bg-indigo-600 hover:bg-indigo-500 text-xs font-semibold py-3 rounded-xl transition duration-150 shadow-lg shadow-indigo-600/20 mt-2" onclick="addEp()"><i class="fa-solid fa-plus mr-1"></i> এপিসোড সেভ করুন</button>
          </div>
        </div>
      </div>

      <!-- dynamic databases feed layout -->
      <div class="lg:col-span-7 space-y-4">
        <div class="text-xs font-bold tracking-wider uppercase text-slate-400 flex items-center gap-2 mb-1">
          <i class="fa-solid fa-database text-purple-400"></i> লাইভ আইটেম কালেকশন
        </div>
        <!-- list placeholders dynamic -->
        <div id="ml-container" class="space-y-3">
          <div id="ml"></div>
        </div>
        <div id="sl-container" class="space-y-3 hidden">
          <div id="sl"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- notifications toast popup element -->
<div id="toast" class="fixed bottom-6 right-6 px-5 py-3.5 rounded-xl text-xs font-semibold shadow-2xl transform translate-y-20 opacity-0 transition-all duration-300 z-50 flex items-center gap-2"></div>

<script>
var D = [];
var BASE = window.location.origin;
var $=function(id){return document.getElementById(id);};

function xid(v){var m=v.match(/tt\d+/);return m?m[0]:v.trim();}

function init(){
  $('manifest-url').textContent = BASE + '/manifest.json';
  $('install-link').href = 'stremio://' + window.location.host + '/manifest.json';
  fetch('/api/me').then(function(r){return r.json();}).then(function(me){
    if(me.loggedIn){show();load();}
  });
  sw('movie'); // select default state safely
}

function show(){$('lov').style.display='none';$('app').style.display='block';}

function login(){
  fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:$('pw').value})})
  .then(function(r){
    if(r.ok){show();load();}
    else $('lerr').style.display='flex';
  });
}

function logout(){
  fetch('/api/logout',{method:'POST'}).then(function(){location.reload();});
}

function load(){
  fetch('/api/movies').then(function(r){return r.json();}).then(function(d){D=d;render();});
}

function updateStats(mvCount, srCount) {
  $('count-movies').textContent = mvCount;
  $('count-series').textContent = srCount;
}

function addMovie(){
  var id=xid($('mi').value),url=$('mu').value.trim(),u1=$('m1').value.trim(),u7=$('m7').value.trim();
  if(!id||!url){toast('IMDB ID ও Stream URL প্রধান করুন','e');return;}
  var item={id:id,type:'movie',streamUrl:url};
  if(u1)item.streamUrl1080p=u1;
  if(u7)item.streamUrl720p=u7;
  post(item,function(d){
    D=d;render();
    $('mi').value=$('mu').value=$('m1').value=$('m7').value='';
    toast('নতুন মুভি কালেকশনে যুক্ত হয়েছে 🎬');
  });
}

function addEp(){
  var id=xid($('si').value),s=parseInt($('ss').value),e=parseInt($('se').value),url=$('su').value.trim();
  if(!id||!url){toast('IMDB ID ও Stream URL প্রধান করুন','e');return;}
  var item={id:id,type:'series',episodes:[{season:s,episode:e,streamUrl:url}]};
  post(item,function(d){
    D=d;render();
    $('su').value='';$('se').value=e+1;
    toast('এপিসোডটি সিরিজে যোগ হয়েছে 📺');
  });
}

function post(item,cb){
  fetch('/api/movies',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(item)})
  .then(function(r){return r.json();}).then(function(d){cb(d.data);});
}

function del(id){
  if(!confirm(id+' মুভি বা সিরিজটি ডাটাবেজ থেকে সম্পূর্ণ মুছে ফেলবেন?'))return;
  fetch('/api/movies/'+id,{method:'DELETE'}).then(function(r){return r.json();}).then(function(d){D=d.data;render();toast('আইটেমটি সফলভাবে মুছে ফেলা হয়েছে','e');});
}

function delEp(id,s,e){
  fetch('/api/movies/'+id+'/episodes/'+s+'/'+e,{method:'DELETE'}).then(function(r){return r.json();}).then(function(d){D=d.data;render();toast('এপিসোডটি মুছে ফেলা হয়েছে','e');});
}

function render(){
  var mv=D.filter(function(m){return m.type==='movie';}),
      sr=D.filter(function(m){return m.type==='series';});

  updateStats(mv.length, sr.length);

  if(mv.length===0){$('ml').innerHTML='<div class="glass text-slate-500 text-center text-xs py-12 rounded-2xl border-dashed border-white/10"><i class="fa-solid fa-folder-open text-xl mb-2 block"></i>কোনো মুভি ডাটাবেজে পাওয়া যায়নি</div>';}
  else {
    $('ml').innerHTML=mv.map(function(m){
      var quals=[m.streamUrl1080p?'1080p':'',m.streamUrl720p?'720p':'',m.streamUrl?'Default':''].filter(Boolean).join(' · ');
      return '<div class="glass p-4 rounded-xl flex items-center justify-between border border-white/5 shadow-md hover:border-purple-500/20 transition group">' +
             '<div><div class="text-xs font-semibold flex items-center gap-2"><span class="px-2 py-0.5 rounded text-[9px] font-bold bg-purple-500/10 text-purple-400 border border-purple-500/20 uppercase tracking-wider">Movie</span>'+m.id+'</div>' +
             '<div class="text-[11px] text-slate-400 mt-1"><i class="fa-solid fa-circle-nodes text-[9px] text-slate-600 mr-1"></i>'+quals+'</div></div>' +
             '<button class="bg-red-500/10 hover:bg-red-500 text-red-400 hover:text-white text-[11px] font-semibold px-3 py-1.5 rounded-lg transition duration-150 flex items-center gap-1" onclick="del(\''+m.id+'\')"><i class="fa-regular fa-trash-can text-[10px]"></i> মুছুন</button></div>';
    }).join('');
  }

  if(sr.length===0){$('sl').innerHTML='<div class="glass text-slate-500 text-center text-xs py-12 rounded-2xl border-dashed border-white/10"><i class="fa-solid fa-folder-open text-xl mb-2 block"></i>কোনো টিভি সিরিজ ডাটাবেজে পাওয়া যায়নি</div>';}
  else {
    $('sl').innerHTML=sr.map(function(s){
      var eps=(s.episodes||[]).map(function(e){
        var sn=String(e.season).padStart(2,'0'),en=String(e.episode).padStart(2,'0');
        return '<div class="flex items-center justify-between bg-black/20 border border-white/5 rounded-xl px-3 py-2 text-xs text-slate-300 hover:border-white/10 transition">' +
               '<span class="font-mono text-indigo-300 font-medium">S'+sn+'E'+en+'</span>' +
               '<span class="text-[11px] text-slate-500 truncate max-w-[240px] md:max-w-[360px] font-mono px-4">'+e.streamUrl+'</span>' +
               '<button class="text-slate-500 hover:text-red-400 p-1 rounded transition" onclick="delEp(\''+s.id+'\','+e.season+','+e.episode+')"><i class="fa-solid fa-xmark text-sm"></i></button></div>';
      }).join('');
      
      return '<div class="glass p-5 rounded-xl shadow-md border border-white/5">' +
             '<div class="flex justify-between items-center pb-3 border-b border-white/5 mb-4">' +
             '<div><span class="px-2 py-0.5 rounded text-[9px] font-bold bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 uppercase tracking-wider mr-2">Series</span><strong class="text-xs font-semibold">'+s.id+'</strong></div>' +
             '<button class="bg-red-500/10 hover:bg-red-500 text-red-400 hover:text-white text-[10px] font-bold px-2.5 py-1 rounded-md transition flex items-center gap-1" onclick="del(\''+s.id+'\')"><i class="fa-solid fa-dumpster-fire"></i> সব মুছুন</button></div>' +
             '<div class="space-y-2 max-h-52 overflow-y-auto pr-1">' + eps + '</div></div>';
    }).join('');
  }
}

function sw(t){
  $('pm').style.display=t==='movie'?'block':'none';
  $('ps').style.display=t==='series'?'block':'none';
  
  $('ml-container').style.display=t==='movie'?'block':'none';
  $('sl-container').style.display=t==='series'?'block':'none';

  $('tm').className='flex-1 py-2 text-xs font-semibold rounded-lg transition duration-150 '+(t==='movie'?'bg-purple-600/20 text-purple-400 font-bold border border-purple-500/20':'text-slate-400 hover:bg-white/5');
  $('ts').className='flex-1 py-2 text-xs font-semibold rounded-lg transition duration-150 '+(t==='series'?'bg-indigo-600/20 text-indigo-400 font-bold border border-indigo-500/20':'text-slate-400 hover:bg-white/5');
}

function cp(){
  navigator.clipboard.writeText(BASE+'/manifest.json').then(function(){
    toast('Manifest URL ক্লিপবোর্ডে কপি করা হয়েছে 📋');
  });
}

function toast(msg,type){
  var t=$('toast'); t.innerHTML = type === 'e' ? '<i class="fa-solid fa-circle-exclamation text-red-400"></i> '+msg : '<i class="fa-solid fa-circle-check text-green-400"></i> '+msg;
  t.style.background = type === 'e' ? 'rgba(31, 15, 15, 0.95)' : 'rgba(15, 31, 15, 0.95)';
  t.style.border = type === 'e' ? '1px solid rgba(239, 68, 68, 0.2)' : '1px solid rgba(34, 197, 94, 0.2)';
  t.style.color = type === 'e' ? '#fca5a5' : '#bbf7d0';
  
  t.classList.remove('translate-y-20', 'opacity-0');
  t.classList.add('translate-y-0', 'opacity-100');
  
  setTimeout(function(){
    t.classList.remove('translate-y-0', 'opacity-100');
    t.classList.add('translate-y-20', 'opacity-0');
  }, 3000);
}

init();
</script>
</body>
</html>
