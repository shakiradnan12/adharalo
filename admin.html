<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AdharAlo Cyber Engine v4.0 (OMDb Pro Ultra)</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
  body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    background: radial-gradient(circle at 50% 0%, #161233, #07040d);
    color: #f8fafc;
    overflow-x: hidden;
  }
  .title-font {
    font-family: 'Space Grotesk', sans-serif;
  }
  body::before {
    content: "";
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: linear-gradient(rgba(168, 85, 247, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(168, 85, 247, 0.03) 1px, transparent 1px);
    background-size: 30px 30px;
    z-index: -1;
    pointer-events: none;
  }
  .cyber-card {
    background: rgba(13, 9, 28, 0.65);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.05);
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
  }
  .cyber-card:hover {
    border-color: rgba(168, 85, 247, 0.2);
    box-shadow: 0 0 30px rgba(168, 85, 247, 0.05);
  }
  .neon-glow-purple { box-shadow: 0 0 20px rgba(168, 85, 247, 0.4); }
  .neon-glow-indigo { box-shadow: 0 0 20px rgba(99, 102, 241, 0.4); }
  .cyber-input {
    background: rgba(4, 2, 10, 0.8);
    border: 1px solid rgba(255, 255, 255, 0.08);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .cyber-input:focus {
    border-color: #a855f7;
    box-shadow: 0 0 15px rgba(168, 85, 247, 0.25);
    background: rgba(4, 2, 10, 0.95);
  }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(168, 85, 247, 0.2); border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(168, 85, 247, 0.4); }
</style>
</head>
<body class="min-h-screen">

<div id="lov" class="fixed inset-0 flex items-center justify-center z-50 px-4 bg-[#050309]/80 backdrop-blur-md">
  <div class="cyber-card p-10 rounded-3xl w-full max-w-md relative overflow-hidden">
    <div class="w-20 h-20 bg-gradient-to-tr from-purple-600 to-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-6 text-3xl text-white shadow-xl neon-glow-purple">
      <i class="fa-solid fa-terminal animate-pulse"></i>
    </div>
    <h2 class="title-font text-2xl font-bold tracking-tight text-center bg-gradient-to-r from-white via-slate-200 to-slate-400 bg-clip-text text-transparent">CYBER CORE LOGIN</h2>
    <p class="text-xs text-purple-400/60 text-center tracking-widest uppercase mt-1 mb-8">Secure System Authentication</p>
    <div class="mb-5 relative">
      <span class="absolute left-4 top-3.5 text-slate-500 text-sm"><i class="fa-solid fa-lock"></i></span>
      <input id="pw" type="password" placeholder="ENTER CODESECURE ACCESS" class="cyber-input w-full pl-11 pr-4 py-3.5 rounded-xl text-xs tracking-widest text-white text-center font-mono outline-none" onkeydown="if(event.key==='Enter')login()">
    </div>
    <button class="w-full bg-gradient-to-r from-purple-600 via-purple-700 to-indigo-600 hover:opacity-90 text-xs tracking-widest title-font font-bold py-4 rounded-xl transition-all duration-300 shadow-lg shadow-purple-600/20 active:scale-[0.98]" onclick="login()">INITIALIZE SYSTEM</button>
    <p id="lerr" class="text-red-400 text-xs mt-4 hidden flex items-center justify-center gap-1.5 font-mono"><i class="fa-solid fa-triangle-exclamation"></i> ACCESS DENIED: INVALID KEY</p>
  </div>
</div>

<div id="app" class="hidden min-h-screen pb-20">
  <nav class="cyber-card sticky top-0 z-40 px-6 lg:px-12 py-4 flex items-center justify-between border-b border-white/5 bg-[#0a0714]/80">
    <div class="flex items-center gap-3">
      <div class="w-3 h-3 rounded-full bg-emerald-500 relative flex"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span></div>
      <span class="title-font font-bold text-lg lg:text-xl tracking-wider text-white">ADHARALO <span class="bg-gradient-to-r from-purple-400 to-indigo-400 bg-clip-text text-transparent font-medium text-sm">OS v4.0</span></span>
    </div>
    <div class="flex items-center gap-4">
      <a id="install-link" href="#" class="hidden sm:flex bg-gradient-to-r from-purple-600/10 to-indigo-600/10 hover:from-purple-600/20 hover:to-indigo-600/20 text-purple-300 border border-purple-500/20 text-xs font-bold px-4 py-2.5 rounded-xl items-center gap-2 transition-all"><i class="fa-solid fa-circle-nodes"></i> Mount on Stremio</a>
      <button class="bg-rose-500/10 hover:bg-rose-500/20 text-rose-400 border border-rose-500/20 text-xs font-bold p-3 rounded-xl transition-all" onclick="logout()"><i class="fa-solid fa-power-off"></i></button>
    </div>
  </nav>

  <div class="max-w-6xl mx-auto px-4 mt-10">
    <div class="cyber-card p-6 rounded-3xl flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8 border border-purple-500/10">
      <div class="flex items-center gap-4">
        <div class="w-12 h-12 rounded-2xl bg-purple-500/10 flex items-center justify-center text-purple-400 text-lg"><i class="fa-solid fa-satellite-dish"></i></div>
        <div>
          <div class="text-[10px] uppercase font-bold tracking-widest text-purple-400 mb-0.5">Live Stremio Engine Endpoint</div>
          <div class="font-mono text-xs text-slate-300 select-all" id="manifest-url">CONNECTING...</div>
        </div>
      </div>
      <button class="bg-gradient-to-r from-purple-600 to-indigo-600 text-white text-xs font-bold px-6 py-3 rounded-xl transition shadow-lg" onclick="cp()"><i class="fa-regular fa-clone"></i> COPY MANIFEST</button>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-3 gap-5 mb-10">
      <div class="cyber-card p-6 rounded-2xl flex items-center justify-between relative overflow-hidden group">
        <div class="flex items-center gap-4">
          <div class="w-14 h-14 rounded-2xl bg-purple-500/10 flex items-center justify-center text-2xl text-purple-400"><i class="fa-solid fa-photo-film"></i></div>
          <div>
            <div class="text-xs uppercase tracking-wider text-slate-400">MOVIES DEPLOYED</div>
            <div class="text-3xl font-bold title-font mt-1 text-white" id="count-movies">0</div>
          </div>
        </div>
      </div>
      <div class="cyber-card p-6 rounded-2xl flex items-center justify-between relative overflow-hidden group">
        <div class="flex items-center gap-4">
          <div class="w-14 h-14 rounded-2xl bg-indigo-500/10 flex items-center justify-center text-2xl text-indigo-400"><i class="fa-solid fa-tv"></i></div>
          <div>
            <div class="text-xs uppercase tracking-wider text-slate-400">SERIES STACK</div>
            <div class="text-3xl font-bold title-font mt-1 text-white" id="count-series">0</div>
          </div>
        </div>
      </div>
      <div class="cyber-card p-6 rounded-2xl flex items-center justify-between relative overflow-hidden group">
        <div class="flex items-center gap-4">
          <div class="w-14 h-14 rounded-2xl bg-emerald-500/10 flex items-center justify-center text-2xl text-emerald-400"><i class="fa-solid fa-bolt-lightning"></i></div>
          <div>
            <div class="text-xs uppercase tracking-wider text-slate-400">OMDB ULTRA ENGINE</div>
            <div class="text-sm font-bold mt-1 text-emerald-400 font-mono tracking-widest">KEY STATUS: CONNECTED</div>
          </div>
        </div>
      </div>
    </div>

    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
      <div class="flex gap-2 p-1 bg-black/40 rounded-2xl max-w-sm border border-white/5">
        <button class="px-6 py-2.5 text-xs font-bold tracking-wider rounded-xl transition-all" id="tm" onclick="sw('movie')"><i class="fa-solid fa-film mr-2"></i>MOVIES ENGINE</button>
        <button class="px-6 py-2.5 text-xs font-bold tracking-wider rounded-xl transition-all" id="ts" onclick="sw('series')"><i class="fa-solid fa-bolt mr-2"></i>SERIES ENGINE</button>
      </div>
      <div class="relative w-full md:max-w-xs">
        <span class="absolute left-4 top-3 text-slate-500 text-xs"><i class="fa-solid fa-magnifying-glass"></i></span>
        <input id="q-search" type="text" placeholder="নাম, জেনার বা আইডি দিয়ে লাইভ সার্চ..." class="cyber-input w-full pl-10 pr-4 py-2.5 rounded-xl text-xs text-white" oninput="filterItems()">
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
      <div class="lg:col-span-5">
        <div id="pm" class="cyber-card p-6 lg:p-8 rounded-3xl border-t-2 border-purple-500">
          <h3 class="title-font text-sm font-bold tracking-widest mb-6 text-purple-400 uppercase flex items-center gap-2.5"><i class="fa-solid fa-square-plus"></i> Deploy Movie Cluster</h3>
          <div class="space-y-5">
            <div>
              <label class="text-[11px] font-bold uppercase tracking-wider text-slate-400 block mb-2">IMDB Identity</label>
              <input id="mi" type="text" placeholder="tt0816692 বা সম্পুর্ণ IMDB লিংক" class="cyber-input w-full px-4 py-3 rounded-xl text-xs font-mono text-white">
            </div>
            <div>
              <label class="text-[11px] font-bold uppercase tracking-wider text-slate-400 block mb-2">Core Stream URL</label>
              <input id="mu" type="text" placeholder="http://ftp.server/movie.mkv" class="cyber-input w-full px-4 py-3 rounded-xl text-xs text-white">
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div>
                <label class="text-[11px] font-bold uppercase tracking-wider text-slate-400 block mb-2">High Definition (1080p)</label>
                <input id="m1" type="text" placeholder="ঐচ্ছিক লিংক" class="cyber-input w-full px-3 py-3 rounded-xl text-xs text-white">
              </div>
              <div>
                <label class="text-[11px] font-bold uppercase tracking-wider text-slate-400 block mb-2">Standard (720p)</label>
                <input id="m7" type="text" placeholder="ঐচ্ছিক লিংক" class="cyber-input w-full px-3 py-3 rounded-xl text-xs text-white">
              </div>
            </div>
            <button class="w-full bg-gradient-to-r from-purple-600 to-purple-800 text-white text-xs font-bold py-4 rounded-xl transition mt-2 tracking-wider uppercase" onclick="addMovie()"><i class="fa-solid fa-plus mr-2"></i> Inject Into Database</button>
          </div>
        </div>

        <div id="ps" class="cyber-card p-6 lg:p-8 rounded-3xl border-t-2 border-indigo-500 hidden">
          <h3 class="title-font text-sm font-bold tracking-widest mb-6 text-indigo-400 uppercase flex items-center gap-2.5"><i class="fa-solid fa-circle-plus"></i> Mount Series Episode</h3>
          <div class="space-y-5">
            <div>
              <label class="text-[11px] font-bold uppercase tracking-wider text-slate-400 block mb-2">Series IMDB Identity</label>
              <input id="si" type="text" placeholder="tt0944947 বা টিভি সিরিজ লিংক" class="cyber-input w-full px-4 py-3 rounded-xl text-xs font-mono text-white">
            </div>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="text-[11px] font-bold uppercase tracking-wider text-slate-400 block mb-2">Season Index</label>
                <input id="ss" type="number" min="1" value="1" class="cyber-input w-full px-4 py-3 rounded-xl text-xs font-bold text-white text-center">
              </div>
              <div>
                <label class="text-[11px] font-bold uppercase tracking-wider text-slate-400 block mb-2">Episode Index</label>
                <input id="se" type="number" min="1" value="1" class="cyber-input w-full px-4 py-3 rounded-xl text-xs font-bold text-white text-center">
              </div>
            </div>
            <div>
              <label class="text-[11px] font-bold uppercase tracking-wider text-slate-400 block mb-2">Stream Node URL</label>
              <input id="su" type="text" placeholder="http://ftp.server/s01e01.mkv" class="cyber-input w-full px-4 py-3 rounded-xl text-xs text-white">
            </div>
            <button class="w-full bg-gradient-to-r from-indigo-600 to-indigo-800 text-white text-xs font-bold py-4 rounded-xl transition mt-2 tracking-wider uppercase" onclick="addEp()"><i class="fa-solid fa-plus mr-2"></i> Commit Episode Node</button>
          </div>
        </div>
      </div>

      <div class="lg:col-span-7">
        <div id="ml-container" class="space-y-4">
          <div id="ml" class="space-y-3.5"></div>
        </div>
        <div id="sl-container" class="space-y-4 hidden">
          <div id="sl" class="space-y-4"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast" class="fixed bottom-8 right-8 px-6 py-4 rounded-2xl text-xs font-bold shadow-2xl transform translate-y-32 opacity-0 transition-all duration-500 z-50 flex items-center gap-3 backdrop-blur-xl"></div>

<script>
// Apnar deya validated professional OMDb key runtime setup!
var OMDB_API_KEY = 'deb30ab'; 

var D = [];
var nameCache = {}; 
var BASE = window.location.origin;
var currentTab = 'movie';
var $=function(id){return document.getElementById(id);};

function xid(v){var m=v.match(/tt\d+/);return m?m[0]:v.trim();}

function init(){
  $('manifest-url').textContent = BASE + '/manifest.json';
  $('install-link').href = 'stremio://' + window.location.host + '/manifest.json';
  fetch('/api/me').then(function(r){return r.json();}).then(function(me){
    if(me.loggedIn){show();load();}
  });
  sw('movie');
}

function show(){$('lov').style.display='none';$('app').style.display='block';}

function login(){
  fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:$('pw').value})})
  .then(function(r){
    if(r.ok){show();load();}
    else $('lerr').style.display='flex';
  });
}

function logout(){ fetch('/api/logout',{method:'POST'}).then(function(){location.reload();}); }
function load(){ fetch('/api/movies').then(function(r){return r.json();}).then(function(d){D=d;render();}); }

function updateStats(mvCount, srCount) {
  $('count-movies').textContent = mvCount;
  $('count-series').textContent = srCount;
}

// Ultra-fast official OMDb Engine with Advanced Metadata extraction
function fetchName(id, elementId, posterId, metaId) {
  if (nameCache[id]) {
    var cacheData = nameCache[id];
    var el = $(elementId), pEl = $(posterId), mEl = $(metaId);
    if(el) el.textContent = cacheData.title;
    if(pEl && cacheData.poster !== 'N/A') pEl.src = cacheData.poster;
    if(mEl) mEl.textContent = cacheData.meta;
    
    var parent = el.closest(currentTab === 'movie' ? '.movie-item' : '.series-item');
    if(parent) parent.setAttribute('data-name', cacheData.searchString);
    return;
  }

  fetch('https://www.omdbapi.com/?apikey=' + OMDB_API_KEY + '&i=' + id)
    .then(function(r){ return r.json(); })
    .then(function(data){
      var el = $(elementId), pEl = $(posterId), mEl = $(metaId);
      if(data && data.Title) {
        var cleanTitle = data.Title + ' (' + data.Year + ')';
        var rating = data.imdbRating !== 'N/A' ? '⭐ ' + data.imdbRating : '⭐ N/A';
        var genre = data.Genre !== 'N/A' ? data.Genre : 'Unknown';
        var metaText = rating + ' | ' + genre;
        
        nameCache[id] = {
          title: cleanTitle,
          poster: data.Poster,
          meta: metaText,
          searchString: (cleanTitle + ' ' + genre + ' ' + id).toLowerCase()
        };

        if(el) el.textContent = cleanTitle;
        if(pEl && data.Poster !== 'N/A') pEl.src = data.Poster;
        if(mEl) mEl.textContent = metaText;
        
        var parent = el.closest(currentTab === 'movie' ? '.movie-item' : '.series-item');
        if(parent) parent.setAttribute('data-name', nameCache[id].searchString);
      } else {
        if(el) el.textContent = id;
      }
    })
    .catch(function(){ 
      var el = $(elementId); if(el) el.textContent = id;
    });
}

function addMovie(){
  var id=xid($('mi').value),url=$('mu').value.trim(),u1=$('m1').value.trim(),u7=$('m7').value.trim();
  if(!id||!url){toast('ভ্যালিড IMDB ID এবং স্ট্রিম লিঙ্ক ইনপুট দিন','e');return;}
  var item={id:id,type:'movie',streamUrl:url};
  if(u1)item.streamUrl1080p=u1;
  if(u7)item.streamUrl720p=u7;
  post(item,function(d){
    D=d; render();
    $('mi').value=$('mu').value=$('m1').value=$('m7').value='';
    toast('নতুন মুভি ক্লাস্টার সফলভাবে ইনজেক্ট করা হয়েছে! 🚀');
  });
}

function addEp(){
  var id=xid($('si').value),s=parseInt($('ss').value),e=parseInt($('se').value),url=$('su').value.trim();
  if(!id||!url){toast('ভ্যালিড IMDB ID এবং এপিসোড লিঙ্ক দিন','e');return;}
  var item={id:id,type:'series',episodes:[{season:s,episode:e,streamUrl:url}]};
  post(item,function(d){
    D=d; render();
    $('su').value=''; $('se').value=e+1;
    toast('সিরিজ এপিসোড নোড সফলভাবে মাউন্ট করা হয়েছে! ⚡');
  });
}

function post(item,cb){
  fetch('/api/movies',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(item)})
  .then(function(r){return r.json();}).then(function(d){cb(d.data);});
}

function del(id){
  if(!confirm('সাবধান! এই কন্টেন্ট ডেটা সম্পূর্ণ মুছে ফেলতে চান?')) return;
  fetch('/api/movies/'+id,{method:'DELETE'}).then(function(r){return r.json();}).then(function(d){D=d.data;render();toast('ডাটাবেজ ক্লাস্টার ওয়াইপড! 🗑️','e');});
}

function delEp(id,s,e){
  fetch('/api/movies/'+id+'/episodes/'+s+'/'+e,{method:'DELETE'}).then(function(r){return r.json();}).then(function(d){D=d.data;render();toast('এপিসোড নোড রিমুভড! 🛑','e');});
}

function filterItems() {
  var q = $('q-search').value.toLowerCase().trim();
  var items = document.querySelectorAll(currentTab === 'movie' ? '.movie-item' : '.series-item');
  
  items.forEach(function(item) {
    var id = item.getAttribute('data-id').toLowerCase();
    var name = item.getAttribute('data-name') ? item.getAttribute('data-name').toLowerCase() : '';
    if(id.includes(q) || name.includes(q)) {
      item.style.display = currentTab === 'series' ? 'block' : 'flex';
    } else {
      item.style.display = 'none';
    }
  });
}

function render(){
  var mv=D.filter(function(m){return m.type==='movie';}),
      sr=D.filter(function(m){return m.type==='series';});

  updateStats(mv.length, sr.length);

  if(mv.length===0){
    $('ml').innerHTML='<div class="cyber-card text-slate-500 text-center text-xs py-16 rounded-3xl border-dashed border-white/10"><i class="fa-solid fa-ban text-2xl mb-3 block text-purple-500/30"></i>NO MOVIE NODE RECOGNIZED IN DATABASE</div>';
  } else {
    $('ml').innerHTML=mv.map(function(m, index){
      var uniqueElId = 'movie-name-' + index;
      var uniquePostId = 'movie-poster-' + index;
      var uniqueMetaId = 'movie-meta-' + index;
      var quals=[m.streamUrl1080p?'1080p':'',m.streamUrl720p?'720p':'',m.streamUrl?'Default':''].filter(Boolean).join(' / ');
      
      setTimeout(function(){ fetchName(m.id, uniqueElId, uniquePostId, uniqueMetaId); }, 40 * index);

      return '<div class="movie-item cyber-card p-4 rounded-2xl flex items-center justify-between border border-white/5 transition-all duration-300" data-id="'+m.id+'" data-name="">' +
             '<div class="flex items-center gap-3.5">' +
             '  <img id="'+uniquePostId+'" src="https://images.unsplash.com/photo-1594909122845-11baa439b7bf?q=80&w=120" class="w-11 h-16 object-cover rounded-xl border border-white/10 shadow-md bg-purple-950/20" alt="">' +
             '  <div>' +
             '    <div class="text-xs font-bold font-mono text-white flex flex-wrap items-center gap-2"><span class="px-2 py-0.5 rounded-md text-[9px] font-black bg-purple-500/10 text-purple-400 border border-purple-500/20 tracking-widest uppercase">MOVIE</span><span id="'+uniqueElId+'" class="text-slate-200 font-sans font-bold text-sm">Syncing...</span> <span class="text-slate-500 text-[11px] font-normal font-mono">('+m.id+')</span></div>' +
             '    <div id="'+uniqueMetaId+'" class="text-[11px] text-purple-400/80 mt-1 font-sans">Syncing metadata...</div>' +
             '    <div class="text-[11px] text-slate-400 mt-1 font-mono"><i class="fa-solid fa-link text-[9px] text-purple-500/40 mr-1.5"></i>'+quals+'</div>' +
             '  </div>' +
             '</div>' +
             '<button class="bg-rose-500/10 hover:bg-rose-600 text-rose-400 hover:text-white text-[11px] font-bold px-4 py-2 rounded-xl transition duration-200 flex items-center gap-1.5 self-center" onclick="del(\''+m.id+'\')"><i class="fa-solid fa-trash-arrow-up text-[10px]"></i> TERMINATE</button></div>';
    }).join('');
  }

  if(sr.length===0){
    $('sl').innerHTML='<div class="cyber-card text-slate-500 text-center text-xs py-16 rounded-3xl border-dashed border-white/10"><i class="fa-solid fa-ban text-2xl mb-3 block text-indigo-500/30"></i>NO TV-SERIES CLUSTER FOUND IN DATABASE</div>';
  } else {
    $('sl').innerHTML=sr.map(function(s, index){
      var uniqueElId = 'series-name-' + index;
      var uniquePostId = 'series-poster-' + index;
      var uniqueMetaId = 'series-meta-' + index;
      var eps=(s.episodes||[]).map(function(e){
        var sn=String(e.season).padStart(2,'0'),en=String(e.episode).padStart(2,'0');
        return '<div class="flex items-center justify-between bg-black/40 border border-white/5 rounded-xl px-4 py-2.5 text-xs text-slate-300 hover:border-indigo-500/20 transition duration-150">' +
               '<span class="font-mono text-indigo-400 font-bold tracking-wider">S'+sn+'E'+en+'</span>' +
               '<span class="text-[11px] text-slate-400 truncate max-w-[200px] sm:max-w-[320px] font-mono px-4 select-all">'+e.streamUrl+'</span>' +
               '<button class="text-slate-500 hover:text-rose-400 p-1 rounded transition" onclick="delEp(\''+s.id+'\','+e.season+','+e.episode+')"><i class="fa-solid fa-xmark text-sm"></i></button></div>';
      }).join('');
      
      setTimeout(function(){ fetchName(s.id, uniqueElId, uniquePostId, uniqueMetaId); }, 40 * index);

      return '<div class="series-item cyber-card p-5 rounded-2xl border border-white/5" data-id="'+s.id+'" data-name="">' +
             '<div class="flex justify-between items-center pb-4 border-b border-white/5 mb-4">' +
             '  <div class="flex items-center gap-3.5">' +
             '    <img id="'+uniquePostId+'" src="https://images.unsplash.com/photo-1594909122845-11baa439b7bf?q=80&w=120" class="w-11 h-16 object-cover rounded-xl border border-white/10 shadow-md bg-indigo-950/20" alt="">' +
             '    <div>' +
             '      <div class="text-xs font-bold font-mono text-white flex flex-wrap items-center gap-2"><span class="px-2 py-0.5 rounded-md text-[9px] font-black bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 tracking-widest uppercase">SERIES</span><span id="'+uniqueElId+'" class="text-slate-200 font-sans font-bold text-sm">Syncing...</span> <span class="text-slate-500 text-[11px] font-normal font-mono">('+s.id+')</span></div>' +
             '      <div id="'+uniqueMetaId+'" class="text-[11px] text-indigo-400/80 mt-1 font-sans">Syncing metadata...</div>' +
             '    </div>' +
             '  </div>' +
             '  <button class="bg-rose-500/10 hover:bg-rose-600 text-rose-400 hover:text-white text-[10px] font-bold px-3 py-1.5 rounded-lg transition flex items-center gap-1.5" onclick="del(\''+s.id+'\')"><i class="fa-solid fa-dumpster"></i> PURGE ALL</button>' +
             '</div>' +
             '<div class="space-y-2 max-h-56 overflow-y-auto pr-1">' + eps + '</div></div>';
    }).join('');
  }
}

function sw(t){
  currentTab = t;
  $('pm').style.display=t==='movie'?'block':'none';
  $('ps').style.display=t==='series'?'block':'none';
  
  $('ml-container').style.display=t==='movie'?'block':'none';
  $('sl-container').style.display=t==='series'?'block':'none';

  $('tm').className='px-6 py-2.5 text-xs font-bold tracking-wider rounded-xl transition-all duration-300 '+(t==='movie'?'bg-purple-600 text-white neon-glow-purple':'text-slate-400 hover:bg-white/5');
  $('ts').className='px-6 py-2.5 text-xs font-bold tracking-wider rounded-xl transition-all duration-300 '+(t==='series'?'bg-indigo-600 text-white neon-glow-indigo':'text-slate-400 hover:bg-white/5');
  filterItems();
}

function cp(){
  navigator.clipboard.writeText(BASE+'/manifest.json').then(function(){
    toast('Manifest Engine Endpoint Copied Securely! 📡');
  });
}

function toast(msg,type){
  var t=$('toast'); 
  t.innerHTML = type === 'e' ? '<i class="fa-solid fa-triangle-exclamation text-rose-400 text-sm"></i> '+msg : '<i class="fa-solid fa-circle-check text-emerald-400 text-sm"></i> '+msg;
  t.style.background = type === 'e' ? 'rgba(28, 12, 18, 0.95)' : 'rgba(10, 25, 18, 0.95)';
  t.style.border = type === 'e' ? '1px solid rgba(244, 63, 94, 0.2)' : '1px solid rgba(16, 185, 129, 0.2)';
  t.style.color = type === 'e' ? '#fecdd3' : '#d1fae5';
  
  t.classList.remove('translate-y-32', 'opacity-0');
  t.classList.add('translate-y-0', 'opacity-100');
  
  setTimeout(function(){
    t.classList.remove('translate-y-0', 'opacity-100');
    t.classList.add('translate-y-32', 'opacity-0');
  }, 3500);
}

init();
</script>
</body>
</html>
